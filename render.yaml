services:
  - type: web
    name: muunganohub
    env: python
    plan: free
    buildCommand: pip install -r backend/requirements.txt
    startCommand: uvicorn backend.api:app --host 0.0.0.0 --port $PORT
    autoDeploy: true
    envVars:
      - key: OFFLINE_MODE
        value: "true"
      - key: AUTH_BACKEND
        value: "sqlite"
      - key: SEND_AUTH_EMAILS
        value: "true"
      - key: SMTP_HOST
        value: "smtp.gmail.com"
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_FROM_NAME
        value: "MuunganoHub"
      - key: WHATSAPP_GRAPH_VERSION
        value: "v20.0"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: SMTP_FROM_EMAIL
        sync: false
